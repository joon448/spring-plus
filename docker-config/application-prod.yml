app:
  s3:
    bucket: ${APP_S#_BUCKET}
    base-folder: profiles
    presign-ttl-seconds: 600

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health
  endpoint:
    health.probes.enabled: true

jwt:
  secret:
    key: ${JWT_SECRET_KEY}

aws:
  region: ${AWS_REGION}