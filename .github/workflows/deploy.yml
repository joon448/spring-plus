name: Deploy (ECS + EC2)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_ecs:
        description: 'Deploy to ECS'
        required: false
        default: 'true'
      deploy_ec2:
        description: 'Deploy JAR to EC2'
        required: false
        default: 'true'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "tag=${GITHUB_SHA::8}-$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

  # === 트랙 A: Docker → ECR → ECS 롤링 배포 ===
  ecs:
    if: ${{ github.event.inputs.deploy_ecs != 'false' }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Tag Docker image
        env:
          REPO: ${{ secrets.ECR_REPO }}
          TAG:  ${{ needs.prepare.outputs.tag }}
        run: |
          docker build -t "$REPO:$TAG" -t "$REPO:latest" .
          echo "IMAGE=$REPO:$TAG" >> $GITHUB_ENV

      - name: Push to ECR
        run: |
          docker push "${{ env.IMAGE }}"
          docker push "${{ secrets.ECR_REPO }}:latest"

      - name: Fetch current task definition ARN
        id: td
        run: |
          TD_ARN=$(aws ecs describe-services \
            --cluster myapp-cluster \
            --services ecs-task-definition-service-0xnu67j7 \
            --region ${{ secrets.AWS_REGION }} \
            --query 'services[0].taskDefinition' --output text)
          echo "TD_ARN=$TD_ARN" >> $GITHUB_OUTPUT

      - name: Render new task definition from current (replace image)
        run: |
          # 1) 현재 태스크 정의 원본 가져오기
          aws ecs describe-task-definition \
            --task-definition "${{ steps.td.outputs.TD_ARN }}" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'taskDefinition' > base-td.json

          # 2) 등록 불가 필드 제거 + 이미지 교체
          jq --arg IMG "${{ env.IMAGE }}" '
            del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy,
            .deregisteredAt
            )
            | .containerDefinitions[0].image = $IMG
          ' base-td.json > task-def.out.json

          # (디버그) 교체된 이미지 출력
          echo "IMAGE in TD:" && jq -r '.containerDefinitions[0].image' task-def.out.json
          echo "Top-level keys:" && jq -r 'keys[]' task-def.out.json
      - name: Register new task definition
        id: register
        run: |
          TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-def.out.json \
            --query 'taskDefinition.taskDefinitionArn' --output text \
            --region ${{ secrets.AWS_REGION }})
          echo "TD_ARN=$TD_ARN" >> $GITHUB_OUTPUT


      - name: Update ECS service (rolling)
        run: |
          aws ecs update-service \
            --cluster myapp-cluster \
            --service ecs-task-definition-service-0xnu67j7 \
            --task-definition "${{ steps.register.outputs.TD_ARN }}" \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Wait for ECS stability
        run: |
          aws ecs wait services-stable \
            --cluster myapp-cluster \
            --services ecs-task-definition-service-0xnu67j7 \
            --region ${{ secrets.AWS_REGION }}

  # === 트랙 B: Gradle JAR → EC2(systemd) 배포 ===
  ec2:
    if: ${{ github.event.inputs.deploy_ec2 != 'false' }}
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Build JAR (skip tests for speed)
        run: ./gradlew clean bootJar -x test

      - name: Rename jar with timestamp + sha
        run: |
          FILE=$(ls build/libs/*.jar | head -n1)
          NEW="app-${{ needs.prepare.outputs.tag }}.jar"
          mv "$FILE" "build/libs/$NEW"
          echo "ARTIFACT=$NEW" >> $GITHUB_ENV
          ls -l build/libs

      - name: Detect runner public IP
        id: ip
        run: echo "MY_IP=$(curl -s https://checkip.amazonaws.com)/32" >> $GITHUB_OUTPUT

      - name: Configure AWS (for SG open/close)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Open SSH for this runner (temp)
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id sg-0893adff359fd7994 \
            --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp='${{ steps.ip.outputs.MY_IP }}',Description='gha-temporary'}]"

      - name: Prepare release dir on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            sudo mkdir -p /opt/plus/releases
            sudo chown -R $USER:$USER /opt/plus

      - name: Upload JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   "build/libs/${{ env.ARTIFACT }}"
          target:   "/opt/plus/releases/"
          overwrite: true

      - name: Switch symlink & restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_HOME="/opt/plus"
            JAR="$APP_HOME/releases/${{ env.ARTIFACT }}"
            echo "Switch to $JAR"
            ln -sfn "$JAR" "$APP_HOME/app.jar"
            sudo systemctl daemon-reload || true
            sudo systemctl restart todo-management.service
            sudo systemctl --no-pager --full status todo-management.service || true

      - name: Close SSH rule (always)
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id sg-0893adff359fd7994 \
            --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp='${{ steps.ip.outputs.MY_IP }}'}]"
